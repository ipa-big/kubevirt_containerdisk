name: Docker Compose Workload

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  run-docker-compose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build script #docker-compose workload from repo root
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}
          IMG_URL: https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2026-06-19/2026-06-18-raspios-trixie-arm64-lite.img.xz
          IMG_NAME: 2026-06-18-raspios-trixie-arm64-lite
          IMG_PLATFORM: linux/arm64
        run: bash ./build.sh
#        run: docker compose up --build --abort-on-container-exit --exit-code-from raspios-lite-builder

#      - name: Tear down docker-compose stack
#        if: always()
#        run: docker compose down --volumes --remove-orphans