name: Raspberry Pi Containerdisk Builder

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  publish-trixie-containerdisk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve containerdisk image tag
        id: image-tag
        shell: bash
        run: |
          source ./build-raspios-lite-containerdisk.sh
          echo "value=$(default_image_tag)" >> "${GITHUB_OUTPUT}"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Trixie containerdisk
        env:
          IMAGE_TAG_OVERRIDE: ${{ steps.image-tag.outputs.value }}
        run: bash ./build-raspios-lite-containerdisk.sh

  publish-bookworm-containerdisk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve containerdisk image tag
        id: image-tag
        shell: bash
        run: |
          source ./build-raspios-lite-containerdisk.sh
          export BOOKWORM_IMG_NAME
          BOOKWORM_IMG_NAME=$(grep '^BOOKWORM_IMG_NAME=' build-raspios-lite-containerdisk.sh | cut -d'"' -f2)
          echo "value=$(default_image_tag "$BOOKWORM_IMG_NAME")" >> "${GITHUB_OUTPUT}"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Bookworm containerdisk
        env:
          IMAGE_TAG_OVERRIDE: ${{ steps.image-tag.outputs.value }}
          BUILD_TARGET: 'bookworm'
        run: bash ./build-raspios-lite-containerdisk.sh
