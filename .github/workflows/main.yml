name: Docker Compose Workload

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  run-docker-compose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dedicated Raspberry Pi containerdisk build
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./build-raspios-lite-containerdisk.sh
#        run: docker compose up --build --abort-on-container-exit --exit-code-from raspios-lite-builder

#      - name: Tear down docker-compose stack
#        if: always()
#        run: docker compose down --volumes --remove-orphans