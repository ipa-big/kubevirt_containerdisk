name: Raspberry Pi Containerdisk Builder

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-raspberry-pi-containerdisk:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run dedicated Raspberry Pi containerdisk builder validation
        env:
          PUSH_IMAGE: 'false'
          # Note: BUILD_ALL defaults to false, so this builds only Trixie. To build both, set BUILD_ALL=true in the workflow
        run: bash ./build-raspios-lite-containerdisk.sh

  publish-raspberry-pi-containerdisk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve containerdisk image tag
        id: image-tag
        shell: bash
        run: |
          source ./build-raspios-lite-containerdisk.sh
          echo "value=$(default_image_tag)" >> "${GITHUB_OUTPUT}"
      - name: Run dedicated Raspberry Pi containerdisk builder
        env:
          IMAGE_TAG_OVERRIDE: ${{ steps.image-tag.outputs.value }}
          PUSH_IMAGE: 'false'
          # Note: BUILD_ALL defaults to false, so this builds only Trixie. To build both, set BUILD_ALL=true in the workflow
        run: bash ./build-raspios-lite-containerdisk.sh
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push prepared Raspberry Pi containerdisk image
        run: docker push "${{ steps.image-tag.outputs.value }}"
