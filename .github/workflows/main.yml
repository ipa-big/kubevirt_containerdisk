name: Raspberry Pi Containerdisk Builder

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-raspberry-pi-containerdisk:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run dedicated Raspberry Pi containerdisk builder validation
        env:
          PUSH_IMAGE: 'false'
        run: bash ./build-raspios-lite-containerdisk.sh

  publish-raspberry-pi-containerdisk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dedicated Raspberry Pi containerdisk builder
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_IMAGE: 'true'
        run: bash ./build-raspios-lite-containerdisk.sh
